services:
  db:
    image: postgres:15
    container_name: indigo-db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:17
    container_name: indigo-odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - ./config:/etc/odoo
      - odoo-data:/var/lib/odoo
    restart: unless-stopped
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]

volumes:
  db-data:
  odoo-data:
